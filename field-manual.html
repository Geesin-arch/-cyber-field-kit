    <p class="lead">This is a complete beginner's path into cybersecurity and ethical hacking — written assuming you have never touched a terminal, and covering every foundational idea, not just the exciting parts.</p>
    <p>Every chapter follows the same shape: a plain-language explanation, a table of key terms or commands, a "field exercise" you can safely try yourself, and a short quiz to check it stuck.</p>
    <div class="card warn">
      <div class="label">Before chapter 1 — the one rule that matters most</div>
      <p style="margin-bottom:0">Accessing any computer, account, network, or website without the owner's written permission is illegal in almost every country, regardless of intent. This manual only ever asks you to practice on: your own machines, purpose-built legal training platforms (introduced in chapter 9), or systems you have explicit written authorization to test. Nothing here is a shortcut around that rule.</p>
    </div>
    <h3>What this manual is honest about</h3>

{
  id:"ch1", num:"01", title:"Computers & operating systems", stamp:"foundation", stampText:"FOUNDATION",
  html:`
    <div class="chapter-head">
      <div><div class="eyebrow">Chapter 01 · Foundation</div><h2>Computers &amp; operating systems</h2></div>
      <div class="stamp foundation">FOUNDATION<br>LAYER</div>
    </div>
    <p class="lead">Before you can secure or test a system, you need to know what's actually happening inside one. This chapter has no "hacking" in it on purpose — it's the ground everything else stands on.</p>

    <div class="card definition">
      <div class="term">Operating system (OS)</div>
      <p style="margin-bottom:0">The software that manages a computer's hardware and lets other programs run (example: Windows, macOS, and Linux are all operating systems — they all do the same core job, differently).</p>
    </div>

    <h3>Key concepts</h3>
    <table>
      <tr><th>Term</th><th>Plain-language definition</th></tr>
      <tr><td><code>Process</code></td><td>A running instance of a program (example: opening a browser twice creates two separate processes).</td></tr>
      <tr><td><code>File system</code></td><td>The structure an OS uses to organize files into folders/directories on disk (example: <code>C:\Users\You\Documents</code> on Windows).</td></tr>
      <tr><td><code>Permissions</code></td><td>Rules controlling who can read, write, or run a given file (example: a teacher can edit a shared document, students can only view it).</td></tr>
      <tr><td><code>Kernel</code></td><td>The core of the OS that talks directly to the hardware — CPU, memory, disk (example: when you plug in a USB drive, the kernel is what recognizes it).</td></tr>
      <tr><td><code>RAM vs storage</code></td><td>RAM is fast, temporary "working memory". Storage (SSD/HDD) is slower but permanent (example: RAM is like your desk while you work; storage is like a filing cabinet that keeps things after you leave).</td></tr>
    </table>

    <div class="card practice">
      <div class="label">✓ Safe to practice — on your own device</div>
      <p style="margin-bottom:0">Open your Task Manager (Windows) or Activity Monitor (Mac) and find: (1) how many processes are currently running, (2) which one is using the most RAM. This is exactly what a security analyst checks first when a machine "feels wrong."</p>
    </div>

    <h3>Quiz</h3>
    <div class="quiz" data-quiz="q1">
      <div class="quiz-title">Check your understanding</div>

          <button class="qopt" data-correct="true">A running instance of a program</button>
          <button class="qopt" data-correct="false">A type of permission setting</button>
        </div>
      </div>
      <div class="qitem" data-q="1">
        <p>Which is faster but temporary — cleared when the computer restarts?</p>

          <button class="qopt" data-correct="false">Storage (SSD/HDD)</button>

{
  id:"ch2", num:"02", title:"Networking fundamentals", stamp:"foundation", stampText:"FOUNDATION",
  html:`
    <div class="chapter-head">
      <div><div class="eyebrow">Chapter 02 · Foundation</div><h2>Networking fundamentals</h2></div>
      <div class="stamp foundation">FOUNDATION<br>LAYER</div>
    </div>
    <p class="lead">Nearly every attack and every defense in cybersecurity happens over a network. If you understand how two computers actually talk to each other, most of "hacking" stops feeling mysterious.</p>

    <div class="card definition">
      <div class="term">IP address</div>
      <p style="margin-bottom:0">A unique numeric address identifying a device on a network — similar to a postal address (example: <code>192.168.1.10</code> might be your laptop's address on your home Wi-Fi).</p>
    </div>

    <table>
      <tr><th>Term</th><th>Plain-language definition</th></tr>
      <tr><td><code>DNS</code></td><td>The system that translates human-readable names into IP addresses (example: typing <code>google.com</code> instead of remembering its numeric address).</td></tr>
      <tr><td><code>Port</code></td><td>A numbered "door" on a device for a specific type of traffic (example: port 443 is used for secure web traffic, like a labeled door for HTTPS visitors).</td></tr>
      <tr><td><code>TCP / UDP</code></td><td>The two main ways data is transmitted (example: TCP is like a phone call where both sides confirm they heard each other; UDP is like shouting information across a room — faster, but no confirmation).</td></tr>
      <tr><td><code>Firewall</code></td><td>A gatekeeper that allows or blocks traffic based on rules (example: blocking all incoming connections except web traffic, like a bouncer with a guest list).</td></tr>
      <tr><td><code>Router</code></td><td>A device that directs traffic between networks (example: the box that connects your home Wi-Fi to the internet).</td></tr>
    </table>

    <h3>Everyday commands to see this in action</h3>
    <pre>ping google.com        # checks if a server responds, and how fast
tracert google.com     # (Windows) shows every hop your data takes
traceroute google.com  # (Mac/Linux) same thing
ipconfig               # (Windows) shows your own IP address
ifconfig               # (Mac/Linux) same thing</pre>

    <div class="card practice">
      <div class="label">✓ Safe to practice — on your own device</div>
      <p style="margin-bottom:0">Open a terminal or command prompt and run <code>ping</code> against a site you own or a well-known public site like <code>ping 8.8.8.8</code> (Google's public DNS server — pinging it is standard, harmless, and done by network admins constantly). Notice the "time=" value — that's your latency in milliseconds.</p>
    </div>

{

  html:`
    <div class="chapter-head">
      <div><div class="eyebrow">Chapter 03 · Foundation</div><h2>Linux &amp; the command line</h2></div>
      <div class="stamp foundation">FOUNDATION<br>LAYER</div>
    </div>
    <p class="lead">Almost every serious cybersecurity tool runs on Linux, and nearly all of them are used from the command line rather than by clicking icons. This is uncomfortable at first and becomes natural fast.</p>

    <div class="card definition">
      <div class="term">Kali Linux</div>
      <p style="margin-bottom:0">A Linux version pre-loaded with hundreds of security testing tools. It's not "special" or dangerous by itself — it's just a toolbox (example: it's like a mechanic's fully-stocked toolbox — the tools aren't illegal, what you point them at is what matters). Running it in a virtual machine (VirtualBox/VMware) keeps it separate from your main system.</p>
    </div>

    <h3>Essential commands</h3>
    <table>
      <tr><th>Command</th><th>What it does</th></tr>
      <tr><td><code>pwd</code></td><td>Print current directory (where am I?)</td></tr>
      <tr><td><code>ls</code></td><td>List files in the current folder</td></tr>
      <tr><td><code>cd folder</code></td><td>Change into a folder</td></tr>
      <tr><td><code>mkdir name</code></td><td>Make a new folder</td></tr>

      <tr><td><code>chmod</code></td><td>Change a file's read/write/execute permissions</td></tr>
      <tr><td><code>sudo</code></td><td>Run a command with administrator privileges</td></tr>

{
  id:"ch4", num:"04", title:"Programming basics", stamp:"foundation", stampText:"FOUNDATION",
  html:`
    <div class="chapter-head">
      <div><div class="eyebrow">Chapter 04 · Foundation</div><h2>Programming basics (Python &amp; Bash)</h2></div>
      <div class="stamp foundation">FOUNDATION<br>LAYER</div>
    </div>
    <p class="lead">You don't need to be a software engineer, but reading and writing small scripts is what separates "runs other people's tools" from "understands what the tool is actually doing."</p>

    <div class="card definition">
      <div class="term">Script</div>
      <p style="margin-bottom:0">A short program written to automate a task — usually just a few to a few dozen lines (example: a script that renames 100 photo files at once instead of you doing it by hand).</p>
    </div>

    <h3>Python basics reference</h3>
    <table>
      <tr><th>Concept</th><th>Example</th></tr>
      <tr><td>Variable</td><td><code>name = "Alex"</code></td></tr>
      <tr><td>Condition</td><td><code>if age >= 18:</code></td></tr>
      <tr><td>Loop</td><td><code>for i in range(5):</code></td></tr>
      <tr><td>Function</td><td><code>def greet(name):</code></td></tr>
      <tr><td>List</td><td><code>ports = [21, 22, 80, 443]</code></td></tr>
    </table>

    <p>Here's a small, safe, classic example — a Caesar cipher, one of the oldest encryption methods, used purely to teach how encoding text works:</p>
    <pre>def caesar_encode(text, shift):
    result = ""
    for char in text:
        if char.isalpha():
            base = ord('A') if char.isupper() else ord('a')
            result += chr((ord(char) - base + shift) % 26 + base)
        else:
            result += char
    return result

print(caesar_encode("hello", 3))   # prints: khoor</pre>

    <div class="card practice">
      <div class="label">✓ Safe to practice — in any Python environment</div>
      <p style="margin-bottom:0">Copy the code above into a file called <code>cipher.py</code> and run it with <code>python3 cipher.py</code>. Then try writing a <code>caesar_decode</code> function that reverses it. This single exercise touches loops, conditionals, and basic cryptographic thinking at once.</p>
    </div>

    <h3>Quiz</h3>
    <div class="quiz" data-quiz="q4">
      <div class="quiz-title">Check your understanding</div>
      <div class="qitem" data-q="0">
        <p>What does <code>for i in range(5):</code> do?</p>

          <button class="qopt" data-correct="true">Repeats a block of code 5 times</button>

          <button class="qopt" data-correct="false">Deletes 5 files</button>
        </div>
      </div>

    </div>
  `

{
  id:"ch5", num:"05", title:"Cybersecurity fundamentals", stamp:"foundation", stampText:"FOUNDATION",
  html:`
    <div class="chapter-head">
      <div><div class="eyebrow">Chapter 05 · Foundation</div><h2>Cybersecurity fundamentals</h2></div>
      <div class="stamp foundation">FOUNDATION<br>LAYER</div>
    </div>
    <p class="lead">This is the conceptual core of the whole field — the ideas every certification, tool, and job title is built on top of.</p>

    <div class="card definition">
      <div class="term">The CIA triad</div>
      <p style="margin-bottom:0">The three goals of all security work: <strong>Confidentiality</strong> (only authorized people see the data — example: only you can read your own email), <strong>Integrity</strong> (data isn't tampered with — example: your bank balance can't be silently changed by someone else), <strong>Availability</strong> (systems stay up and usable — example: a shopping site isn't knocked offline during a sale). Nearly every attack breaks one of these three; nearly every defense protects one of these three.</p>
    </div>

    <h3>Common threat types</h3>
    <table>
      <tr><th>Term</th><th>Plain-language definition</th></tr>
      <tr><td>Phishing</td><td>Tricking someone into giving up information or clicking something harmful (example: a fake email pretending to be your bank, asking you to "confirm" your password).</td></tr>
      <tr><td>Malware</td><td>Any malicious software (example: a virus, ransomware, or spyware that installs itself without your knowledge).</td></tr>
      <tr><td>Social engineering</td><td>Manipulating people, not computers, into breaking security procedure (example: someone calling and pretending to be "IT support" to get your password).</td></tr>
      <tr><td>Zero-day</td><td>A vulnerability that's unknown to the vendor and has no fix yet (example: a flaw hackers use before the software company even knows it exists).</td></tr>
      <tr><td>DDoS</td><td>Overwhelming a service with traffic so real users can't access it (example: thousands of fake visitors flooding a website until it crashes).</td></tr>
      <tr><td>Man-in-the-middle</td><td>An attacker secretly intercepting communication between two parties (example: someone reading messages passed between you and a website over unsecured public Wi-Fi).</td></tr>
    </table>

    <p>A concept you'll see everywhere is <strong>hashing</strong> — turning data into a fixed-length fingerprint that can verify integrity without exposing the original data (this is how passwords are stored safely — never in plain text):</p>
    <pre>import hashlib
password = "mypassword123"
hashed = hashlib.sha256(password.encode()).hexdigest()
print(hashed)
# same input always produces the same hash — different input, wildly different hash</pre>

    <div class="card practice">
      <div class="label">✓ Safe to practice</div>
      <p style="margin-bottom:0">Run the hashing code above twice with the same password — notice the output is identical both times. Then change one character in the password and run it again — notice the output is completely different. That's the property that makes hashing useful for storing passwords securely.</p>
    </div>

    <h3>Quiz</h3>
    <div class="quiz" data-quiz="q5">
      <div class="quiz-title">Check your understanding</div>
      <div class="qitem" data-q="0">
        <p>Which part of the CIA triad does a DDoS attack primarily target?</p>
        <div class="qopts">
          <button class="qopt" data-correct="false">Confidentiality</button>
          <button class="qopt" data-correct="false">Integrity</button>
          <button class="qopt" data-correct="true">Availability</button>
        </div>
      </div>
      <div class="qitem" data-q="1">
        <p>Social engineering primarily targets:</p>
        <div class="qopts">
          <button class="qopt" data-correct="true">People, through manipulation</button>
          <button class="qopt" data-correct="false">Network hardware directly</button>
        </div>
      </div>
      <div class="qscore"></div>
    </div>
  `
},
{
  id:"ch6", num:"06", title:"Web technologies", stamp:"foundation", stampText:"FOUNDATION",
  html:`
    <div class="chapter-head">
      <div><div class="eyebrow">Chapter 06 · Foundation</div><h2>Web technologies</h2></div>
      <div class="stamp foundation">FOUNDATION<br>LAYER</div>
    </div>
    <p class="lead">Web applications are the single most common target in real-world security work — understanding how a browser and a server talk is essential before touching any web security tool.</p>

    <table>
      <tr><th>Term</th><th>Plain-language definition</th></tr>
      <tr><td>HTTP / HTTPS</td><td>The protocol browsers use to request web pages. The "S" means the traffic is encrypted (example: a padlock icon in your browser bar means you're on HTTPS).</td></tr>
      <tr><td>Request / Response</td><td>Your browser sends a request; the server sends back a response (example: you click a link — that's the request; the page that loads is the response).</td></tr>
      <tr><td>Cookie</td><td>A small piece of data a site stores in your browser, often to keep you logged in (example: why you don't have to re-enter your password every time you revisit a site).</td></tr>
      <tr><td>Session</td><td>A temporary state that tracks a logged-in user across multiple page visits (example: staying logged into an online store while you browse different pages).</td></tr>
      <tr><td>API</td><td>A defined way for two programs to exchange data (example: a weather app pulling live data from a weather service's API).</td></tr>
      <tr><td>Status code</td><td>A 3-digit number the server sends back (example: <code>200</code> means "OK, here's your page"; <code>404</code> means "page not found").</td></tr>
    </table>

    <p>A simplified example of what actually travels over the network when you load a page:</p>
    <pre>GET /index.html HTTP/1.1
Host: example.com
User-Agent: Mozilla/5.0

--- server responds ---
HTTP/1.1 200 OK
Content-Type: text/html

&lt;html&gt;...page content...&lt;/html&gt;</pre>

    <div class="card practice">
      <div class="label">✓ Safe to practice</div>
      <p style="margin-bottom:0">Open your browser's Developer Tools (F12) → Network tab, then reload any page you're allowed to visit. Click on the first request and look at its status code and headers. You're now reading the exact same data a security tool like Burp Suite reads — just through a friendlier window.</p>
    </div>

    <h3>Quiz</h3>
    <div class="quiz" data-quiz="q6">
      <div class="quiz-title">Check your understanding</div>
      <div class="qitem" data-q="0">
        <p>What does HTTP status code 404 mean?</p>
        <div class="qopts">
          <button class="qopt" data-correct="false">Server error</button>
          <button class="qopt" data-correct="true">Page not found</button>
          <button class="qopt" data-correct="false">Success</button>
        </div>
      </div>
      <div class="qscore"></div>
    </div>
  `
},
{
  id:"ch7", num:"07", title:"How ethical hacking actually works", stamp:"practice", stampText:"METHOD",
  html:`
    <div class="chapter-head">
      <div><div class="eyebrow">Chapter 07 · Methodology</div><h2>How ethical hacking actually works</h2></div>
      <div class="stamp practice">METHOD<br>ONLY</div>
    </div>
    <p class="lead">"Ethical hacking" (also called penetration testing) is a structured, permission-based process — not improvisation. Every legitimate engagement follows roughly the same five stages.</p>

    <table>
      <tr><th>Stage</th><th>What happens</th></tr>
      <tr><td>1. Authorization</td><td>A written contract defines exactly what can be tested, when, and how. Nothing starts before this exists.</td></tr>
      <tr><td>2. Reconnaissance</td><td>Gathering public information about the target — domain names, technology used, employee info.</td></tr>
      <tr><td>3. Scanning</td><td>Identifying live systems, open ports, and running services on the authorized target.</td></tr>
      <tr><td>4. Exploitation &amp; analysis</td><td>Carefully testing whether identified weaknesses can actually be leveraged, within agreed limits.</td></tr>
      <tr><td>5. Reporting</td><td>Documenting every finding clearly so the organization can fix it. This is usually the most valuable part of the whole engagement.</td></tr>
    </table>

    <div class="card warn">
      <div class="label">Why no attack walkthroughs appear here</div>
      <p style="margin-bottom:0">This manual deliberately does not include step-by-step exploitation walkthroughs against real targets — that's precisely the kind of content that gets misused outside a legal, contracted engagement. What you're building toward instead is the judgment and fundamentals to do this properly, then learning technique on legal practice platforms (chapter 9), where mistakes cost nothing and permission is already built in.</p>
    </div>

    <h3>Quiz</h3>
    <div class="quiz" data-quiz="q7">
      <div class="quiz-title">Check your understanding</div>
      <div class="qitem" data-q="0">
        <p>What must exist before any penetration test begins?</p>
        <div class="qopts">
          <button class="qopt" data-correct="true">Written authorization defining scope</button>
          <button class="qopt" data-correct="false">A finished exploit script</button>
        </div>
      </div>
      <div class="qitem" data-q="1">
        <p>Which stage is often considered the most valuable to the client?</p>
        <div class="qopts">
          <button class="qopt" data-correct="false">Scanning</button>
          <button class="qopt" data-correct="true">Reporting</button>
        </div>
      </div>
      <div class="qscore"></div>
    </div>
  `
},
{
  id:"ch8", num:"08", title:"Tools of the trade", stamp:"practice", stampText:"OVERVIEW",
  html:`
    <div class="chapter-head">
      <div><div class="eyebrow">Chapter 08 · Reference</div><h2>Tools of the trade</h2></div>
      <div class="stamp practice">TOOL<br>OVERVIEW</div>
    </div>
    <p class="lead">These are the industry-standard tools you'll meet constantly. This chapter explains what each one is <em>for</em> — you'll learn hands-on usage safely inside the practice platforms in chapter 9.</p>

    <table>
      <tr><th>Tool</th><th>What it's for</th></tr>
      <tr><td>Nmap</td><td>Scans a network to find live devices and open ports/services (example: like knocking on every door of a building to see which ones are unlocked).</td></tr>
      <tr><td>Wireshark</td><td>Captures and inspects network traffic packet-by-packet (example: watching every piece of mail that passes through a post office, one envelope at a time).</td></tr>
      <tr><td>Burp Suite</td><td>Intercepts and analyzes traffic between your browser and a web application (example: pausing a letter mid-delivery to read exactly what it says before it arrives).</td></tr>
      <tr><td>Metasploit</td><td>A framework of known, catalogued vulnerabilities and testing modules used against pre-authorized targets (example: a library of "known weak locks" testers check for, with permission).</td></tr>
      <tr><td>John the Ripper</td><td>Tests password strength by attempting to crack hashes (example: checking if "password123" would be guessed in seconds — used to audit your own passwords).</td></tr>
    </table>

    <div class="card definition">
      <div class="term">A note on Nmap syntax</div>
      <p style="margin-bottom:0">Nmap's basic syntax is publicly documented by the tool itself and taught in every intro course — e.g. <code>nmap -sV target</code> checks what services are running. What makes it "ethical" or not isn't the command, it's whether you have permission to point it at that target. Always test against your own machine (<code>localhost</code>) or a lab environment first.</p>
    </div>

    <div class="card practice">
      <div class="label">✓ Safe to practice — on your own machine only</div>
      <p style="margin-bottom:0">Install Nmap, then run <code>nmap localhost</code> — this scans your own computer, which is always legal, and shows you what ports your own machine has open.</p>
    </div>

    <h3>Quiz</h3>
    <div class="quiz" data-quiz="q8">
      <div class="quiz-title">Check your understanding</div>
      <div class="qitem" data-q="0">
        <p>Which tool is primarily used to inspect web traffic between browser and app?</p>
        <div class="qopts">
          <button class="qopt" data-correct="false">Wireshark</button>
          <button class="qopt" data-correct="true">Burp Suite</button>
          <button class="qopt" data-correct="false">John the Ripper</button>
        </div>
      </div>
      <div class="qscore"></div>
    </div>
  `
},
{

    <div class="chapter-head">
      <div><div class="eyebrow">Chapter 10 · Career</div><h2>Certifications &amp; career path</h2></div>
      <div class="stamp practice">CAREER<br>PATH</div>
    </div>
    <table>
      <tr><th>Certification</th><th>Level</th><th>What it proves</th></tr>

{
  id:"glossary", num:"11", title:"Glossary", stamp:"foundation", stampText:"REFERENCE",
  html:`
    <div class="chapter-head">
      <div><div class="eyebrow">Chapter 11 · Reference</div><h2>Glossary of terms</h2></div>
      <div class="stamp foundation">QUICK<br>REFERENCE</div>
    </div>
    <dl class="glossary-grid">
      <div class="gterm"><dt>Authentication</dt><dd>Proving who you are (example: entering a password or scanning your fingerprint to unlock your phone).</dd></div>
      <div class="gterm"><dt>Authorization</dt><dd>What you're allowed to do once identified (example: a logged-in student can view their own grades, not everyone else's).</dd></div>
      <div class="gterm"><dt>Encryption</dt><dd>Scrambling data so only someone with the right key can read it (example: a locked diary only you have the key to).</dd></div>
      <div class="gterm"><dt>VPN</dt><dd>Routes your traffic through an encrypted tunnel, hiding it from your local network (example: like sending mail through a sealed, opaque tube instead of a see-through envelope).</dd></div>
      <div class="gterm"><dt>Vulnerability</dt><dd>A weakness that could be exploited (example: a door lock that can be picked with a bent wire).</dd></div>
      <div class="gterm"><dt>Exploit</dt><dd>Code or a technique that takes advantage of a vulnerability (example: the bent wire itself, and the act of using it on that lock).</dd></div>
      <div class="gterm"><dt>Patch</dt><dd>An update that fixes a known vulnerability (example: your phone's "software update" that fixes a security bug).</dd></div>
      <div class="gterm"><dt>Payload</dt><dd>The part of an exploit that actually does something once delivered (example: once a burglar is inside, the payload is what they actually do — steal, damage, etc.).</dd></div>
      <div class="gterm"><dt>Two-factor authentication (2FA)</dt><dd>Requiring a second proof of identity beyond a password (example: entering a password, then also a code sent to your phone).</dd></div>
      <div class="gterm"><dt>Brute force</dt><dd>Trying many password combinations until one works (example: trying every number 0000–9999 on a bike lock).</dd></div>
      <div class="gterm"><dt>Sandbox</dt><dd>An isolated environment where code can run without affecting the real system (example: a virtual machine used to safely open a suspicious file).</dd></div>
      <div class="gterm"><dt>Bug bounty</dt><dd>A program where companies pay researchers to legally find and report flaws (example: a company paying $500 to a student who found and reported a real flaw in their app).</dd></div>
    </dl>
  `
}
];

/* ============================================================
   RENDER
   ============================================================ */
const tocList = document.getElementById('tocList');
const content = document.getElementById('content');
let currentIndex = 0;

chapters.forEach((ch, i) => {
  const li = document.createElement('li');
  const btn = document.createElement('button');
  btn.className = 'toc-item';
  btn.innerHTML = `<span class="toc-num">${ch.num}</span><span>${ch.title}</span>`;
  btn.onclick = () => showChapter(i);
  li.appendChild(btn);
  tocList.appendChild(li);

  const section = document.createElement('section');
  section.className = 'chapter';
  section.id = ch.id;
  section.innerHTML = ch.html + `
    <div class="navrow">
      <button class="navbtn" data-nav="prev">← Previous</button>
      <button class="navbtn" data-nav="next">Next chapter →</button>
    </div>`;
  content.appendChild(section);
});

function showChapter(i){
  currentIndex = Math.max(0, Math.min(chapters.length - 1, i));
  document.querySelectorAll('.chapter').forEach((s,idx) => s.classList.toggle('active', idx === currentIndex));
  document.querySelectorAll('.toc-item').forEach((b,idx) => b.classList.toggle('active', idx === currentIndex));
  window.scrollTo({top:0, behavior:'smooth'});
  const active = document.querySelectorAll('.chapter')[currentIndex];
  const prevBtn = active.querySelector('[data-nav="prev"]');
  const nextBtn = active.querySelector('[data-nav="next"]');
  prevBtn.disabled = currentIndex === 0;
  nextBtn.disabled = currentIndex === chapters.length - 1;
  prevBtn.onclick = () => showChapter(currentIndex - 1);
  nextBtn.onclick = () => showChapter(currentIndex + 1);
}
showChapter(0);

/* ============================================================
   QUIZ LOGIC (in-memory only, no storage)
   ============================================================ */
document.querySelectorAll('.quiz').forEach(quiz => {
  let answered = 0, correct = 0;
  const total = quiz.querySelectorAll('.qitem').length;
  const scoreEl = quiz.querySelector('.qscore');
  function updateScore(){ scoreEl.textContent = `Score: ${correct} / ${total} answered (${answered}/${total} attempted)`; }
  updateScore();
  quiz.querySelectorAll('.qitem').forEach(qitem => {
    const opts = qitem.querySelectorAll('.qopt');
    opts.forEach(opt => {
      opt.addEventListener('click', () => {
        if(opt.disabled) return;
        const isCorrect = opt.dataset.correct === 'true';
        opts.forEach(o => o.disabled = true);
        opt.classList.add(isCorrect ? 'correct' : 'wrong');
        if(!isCorrect){
          opts.forEach(o => { if(o.dataset.correct === 'true') o.classList.add('correct'); });
        }
        answered++;
        if(isCorrect) correct++;
        updateScore();
      });
    });
  });
});
</script>
</body>
</html>
